<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="premium_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="4" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.7" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- مجموعة المركز: هلال وفانوس -->
  <g transform="translate(512, 512)" filter="url(#premium_glow)">
    
    <!-- الهلال المذهب بتصميم انسيابي -->
    <path d="M120 -280 C-40 -280 -180 -140 -180 20 C-180 180 -40 320 120 320 C60 320 -20 280 -60 180 C-100 80 -100 -40 -60 -140 C-20 -240 60 -280 120 -280 Z" 
          fill="#D4AF37" />

    <!-- فانوس رمضان بتفاصيل فنية في قلب الهلال -->
    <g transform="translate(40, 20) scale(1.1)">
      <!-- قمة الفانوس -->
      <path d="M-30 -140 L0 -180 L30 -140 Z" fill="#D4AF37" stroke="#B8860B" stroke-width="2"/>
      <circle cx="0" cy="-185" r="8" fill="#D4AF37"/>
      
      <!-- جسم الفانوس العلوي -->
      <path d="M-50 -140 L50 -140 L60 -100 L-60 -100 Z" fill="#D4AF37" stroke="#B8860B" stroke-width="2"/>
      
      <!-- زجاج الفانوس المركزي (مضيء) -->
      <path d="M-60 -100 L60 -100 L50 40 L-50 40 Z" fill="#FFF8E1" stroke="#D4AF37" stroke-width="4"/>
      <!-- زخرفة داخل الزجاج -->
      <path d="M0 -100 V40 M-30 -90 L-25 30 M30 -90 L25 30" stroke="#D4AF37" stroke-width="2" opacity="0.4"/>
      
      <!-- قاعدة الفانوس -->
      <path d="M-50 40 L50 40 L70 80 L-70 80 Z" fill="#D4AF37" stroke="#B8860B" stroke-width="2"/>
      <path d="M-80 80 H80 V100 H-80 Z" fill="#B8860B"/>

      <!-- شمعة داخلية رمزية -->
      <rect x="-10" y="-20" width="20" height="40" fill="#FFA000" opacity="0.8"/>
      <path d="M0 -40 Q5 -30 0 -20 Q-5 -30 0 -40" fill="#FFD54F"/>
    </g>

    <!-- نجوم صغيرة متناثرة مذهبة -->
    <g fill="#D4AF37" opacity="0.8">
      <circle cx="-220" cy="-100" r="6"/>
      <path d="M220 -200 L225 -185 L240 -180 L225 -175 L220 -160 L215 -175 L200 -180 L215 -185 Z" />
      <circle cx="280" cy="150" r="4"/>
    </g>
  </g>
</svg>