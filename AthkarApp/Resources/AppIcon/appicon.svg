<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- خلفية بلون الإسلام الأخضر -->
  <rect width="512" height="512" rx="80" fill="#1B5E20"/>
  
  <!-- نمط هندسي إسلامي في الزوايا -->
  <g opacity="0.15" fill="#FFD700">
    <polygon points="0,0 80,0 0,80" />
    <polygon points="512,0 432,0 512,80" />
    <polygon points="0,512 80,512 0,432" />
    <polygon points="512,512 432,512 512,432" />
  </g>

  <!-- هلال ذهبي -->
  <circle cx="256" cy="210" r="110" fill="#FFD700"/>
  <circle cx="300" cy="185" r="95"  fill="#1B5E20"/>

  <!-- نجمة إسلامية داخل الهلال -->
  <g transform="translate(210,160)">
    <polygon points="30,0 36,20 58,20 40,32 46,52 30,40 14,52 20,32 2,20 24,20"
             fill="#FFD700" opacity="0.9"/>
  </g>

  <!-- خط فاصل ذهبي -->
  <rect x="130" y="335" width="252" height="3" rx="2" fill="#FFD700" opacity="0.6"/>

  <!-- نص "أذكار" بتصميم عربي -->
  <text x="256" y="420"
        font-family="'Traditional Arabic', 'Scheherazade New', serif"
        font-size="90"
        font-weight="bold"
        fill="#FFD700"
        text-anchor="middle"
        dominant-baseline="middle">أذكار</text>
</svg>